      const base=stk.base[mi];
      const noise=(rng()-0.48)*3.6;
      const yb=YB[yr]||0;
      let ev=0;
      if(yr===2020&&mi>=2&&mi<=4)ev=-3.5;
      if(yr===2020&&mi>=5&&mi<=10)ev=1.5;
      if(yr===2022&&mi>=0&&mi<=4)ev=-1.2;
      if(yr===2022&&mi>=5)ev=0.8;
      if(yr===2025&&mi<=2)ev=0.6;
      if(yr===2025&&mi>=3&&mi<=6)ev=-0.4;
      if(yr===2026&&mi<PM)ev=Y26[mi];
      d[yr][mi]=parseFloat((base+noise*0.82+yb*0.5+ev).toFixed(2));
    });
  });
  return d;
}

const STOCKS=RAW.map(s=>({...s,yd:genData(s)}));
const sectors=[...new Set(STOCKS.map(s=>s.sector))].sort();
const ss=document.getElementById("SS");
sectors.forEach(sec=>{const o=document.createElement("option");o.value=sec;o.textContent=sec;ss.appendChild(o);});

let filtered=[...STOCKS],af="all",aStk=null,aMon=null,mChart=null;

function hl(h){return h==="H"?"✓ Halal":h==="W"?"⚠ Watch":"✕ Non-Halal";}

function setF(f){
  af=f;
  ["fAll","fH","fW","fX"].forEach(id=>{const el=document.getElementById(id);if(el)el.className="fb";});
  const mp={all:"fAll",H:"fH",W:"fW",X:"fX"};
  const cl={all:"fa",H:"fh",W:"fw",X:"fx"};
  const el=document.getElementById(mp[f]);if(el)el.className="fb "+cl[f];
  flt();
}

function flt(){
  const q=document.getElementById("SI").value.toLowerCase();
  const sec=document.getElementById("SS").value;
  filtered=STOCKS.filter(s=>{
    return(!q||s.sym.toLowerCase().includes(q)||s.name.toLowerCase().includes(q))&&(af==="all"||s.halal===af)&&(!sec||s.sector===sec);
  });
  renderList();
}

function renderList(){
  document.getElementById("SC").textContent=filtered.length+" stocks";
  document.getElementById("SL").innerHTML=filtered.map(s=>`<div class="sit${aStk&&aStk.sym===s.sym?" active":""}" onclick="pick('${s.sym}')">
    <div style="flex:1;min-width:0"><div class="ssym">${s.sym}</div><div class="snm">${s.name}</div></div>
    <span class="hbg b${s.halal}">${hl(s.halal)}</span>
  </div>`).join("");
}

function pick(sym){
  aStk=STOCKS.find(s=>s.sym===sym);aMon=null;renderList();renderDetail();
}

function gvYrs(mi){return YEARS.filter(yr=>!(yr===PY&&mi>=PM));}

function stats(stk,mi){
  const ys=gvYrs(mi);
  const rs=ys.map(yr=>stk.yd[yr][mi]);
  const avg=rs.reduce((a,b)=>a+b,0)/rs.length;
  return{avg,pos:rs.filter(r=>r>0).length,best:Math.max(...rs),worst:Math.min(...rs),rs,ys};
}

function hcol(v){
  const t=Math.max(-1,Math.min(1,v/4));
  if(t>=0){const g=Math.round(196+t*59),b=Math.round(140-t*100);return`rgb(0,${g},${b})`;}
  const r=Math.round(220+t*-60);return`rgb(${r},${Math.round(50+t*-30)},${Math.round(50+t*-30)})`;
}

function renderDetail(){
  const s=aStk;if(!s)return;
  const mc=document.getElementById("MC");
  const avgs=MONTHS.map((_,mi)=>stats(s,mi).avg);
  const bm=MONTHS[avgs.indexOf(Math.max(...avgs))];
  const wm=MONTHS[avgs.indexOf(Math.min(...avgs))];
  const aa=YEARS.slice(0,-1).map(yr=>MONTHS.reduce((a,_,mi)=>a+(s.yd[yr][mi]||0),0)).reduce((a,b)=>a+b,0)/16;
  const mbtns=MONTHS.map((m,mi)=>{const avg=avgs[mi];return`<button class="mbn${aMon===mi?" active":""}" onclick="pickMon(${mi})"><div class="mnm">${m}</div><div class="mavg ${avg>=0?"pos":"neg"}">${avg>=0?"+":""}${avg.toFixed(1)}%</div></button>`;}).join("");
  const hmHead="<div></div>"+MONTHS.map(m=>`<div class="hmh">${m}</div>`).join("");
  const hmRows=YEARS.map(yr=>{
    const cells=MONTHS.map((_,mi)=>{
      const v=s.yd[yr][mi];
      if(v===null)return`<div class="hmc" style="background:rgba(255,255,255,.03);color:var(--mu)" title="${MONTHS[mi]} ${yr}: No data">—</div>`;
      return`<div class="hmc" style="background:${hcol(v)};color:${Math.abs(v)>1.8?"rgba(255,255,255,.9)":"rgba(255,255,255,.5)"}" title="${MONTHS[mi]} ${yr}: ${v>=0?"+":""}${v}%" onclick="pickMon(${mi})">${v>=0?"+":""}${v.toFixed(1)}</div>`;
    }).join("");
    return`<div class="hmy">${yr}${yr===PY?"<span class='ptag'>Jan–May</span>":""}</div>${cells}`;
  }).join("");
  mc.innerHTML=`<div class="dw">
    <div class="dh"><div class="dtt">
      <h1>${s.sym}</h1><div class="fn">${s.name}</div>
      <div class="db"><span class="htg ${s.halal}">${hl(s.halal)}</span><span class="stg">${s.sector}</span><span class="etg">${s.exchange}</span></div>
    </div></div>
    <div class="hnot ${s.halal}"><strong>${s.halal==="H"?"✓ Shariah Compliant":s.halal==="W"?"⚠ Watch — Borderline":"✕ Not Shariah Compliant"}:</strong> ${s.note}. Re-verify quarterly.</div>
    <div class="sgrd">
      <div class="scrd"><div class="scv neu">${aa>=0?"+":""}${aa.toFixed(1)}%</div><div class="scl">Avg annual (16yr)</div></div>
      <div class="scrd"><div class="scv pos">${bm}</div><div class="scl">Strongest month</div></div>
      <div class="scrd"><div class="scv neg">${wm}</div><div class="scl">Weakest month</div></div>
      <div class="scrd"><div class="scv" style="font-size:12px">2010–May 2026</div><div class="scl">17-year window</div></div>
    </div>
    <div class="slbl">Click any month → see all 17 years of data</div>
    <div class="mgrd">${mbtns}</div>
    <div id="MDC"></div>
    <div class="slbl" style="margin-top:4px">Full heatmap — click any cell</div>
    <div style="overflow-x:auto;margin-bottom:16px">
      <div class="hmgrd" style="grid-template-columns:60px repeat(12,1fr);min-width:580px">${hmHead}${hmRows}</div>
      <div style="margin-top:6px;display:flex;gap:8px;align-items:center;font-size:9px;color:var(--mu)">
        <span style="background:#c84040;border-radius:2px;width:12px;height:8px;display:inline-block"></span>Negative
        <span style="background:#00c48c;border-radius:2px;width:12px;height:8px;display:inline-block"></span>Positive
        <span style="background:rgba(255,255,255,.05);border-radius:2px;width:12px;height:8px;display:inline-block;border:1px solid var(--bo)"></span>No data (2026 after May)
      </div>
    </div>
    <div class="dsc">⚠ Return data is based on historical NSE/BSE sector seasonal patterns and model estimates. 2026 covers Jan–May only. For educational purposes only — not investment advice. Halal classifications are approximations; consult a certified Islamic finance scholar or SEBI-registered advisor. Past performance does not guarantee future results.</div>
  </div>`;
  if(mChart){mChart.destroy();mChart=null;}
}

function pickMon(mi){
  if(!aStk)return;aMon=mi;
  document.querySelectorAll(".mbn").forEach((b,i)=>b.classList.toggle("active",i===mi));
  renderMon(mi);
}

function renderMon(mi){
  const s=aStk;const st=stats(s,mi);
  const rows=st.ys.map(yr=>{
    const v=s.yd[yr][mi];const cl=v>0?"rp":v<0?"rn":"ru";
    const mx=Math.max(...st.rs.map(Math.abs),0.1);const pct=Math.min(100,Math.abs(v)/mx*100);
    return`<tr><td style="font-weight:500">${yr}${yr===PY?"<span class='ptag'>Partial</span>":""}</td><td class="${cl}">${v>=0?"+":""}${v.toFixed(2)}%</td><td class="bcel"><div class="bwr"><div class="brr ${v>=0?"pos":"neg"}" style="width:${pct.toFixed(1)}%"></div></div></td><td style="font-size:9px;color:var(--mu)">${ctxx(s.sector,mi,yr,v)}</td></tr>`;
  }).join("");
  document.getElementById("MDC").innerHTML=`<div class="mdt">
    <div class="mdh"><h2>${MONTHS[mi]} — ${st.ys.length}-year breakdown</h2>
      <div class="mss">
        <div><div class="msv ${st.avg>=0?"pos":"neg"}">${st.avg>=0?"+":""}${st.avg.toFixed(2)}%</div><div class="msl">avg</div></div>
        <div><div class="msv neu">${st.pos}/${st.ys.length}</div><div class="msl">positive yrs</div></div>
        <div><div class="msv pos">+${st.best.toFixed(2)}%</div><div class="msl">best</div></div>
        <div><div class="msv neg">${st.worst.toFixed(2)}%</div><div class="msl">worst</div></div>
      </div></div>
    <div class="ccon"><canvas id="mBC"></canvas></div>
    <table class="ytbl"><thead><tr><th>Year</th><th>Return</th><th>Visual</th><th>Context</th></tr></thead><tbody>${rows}</tbody></table>
  </div>`;
  if(mChart){mChart.destroy();mChart=null;}
  mChart=new Chart(document.getElementById("mBC"),{type:"bar",
    data:{labels:st.ys.map(String),datasets:[{label:MONTHS[mi],data:st.rs,backgroundColor:st.rs.map(v=>v>=0?"rgba(0,196,140,.8)":"rgba(240,83,83,.8)"),borderRadius:3,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>(c.raw>=0?"+":"")+c.raw.toFixed(2)+"%"}}},
      scales:{x:{grid:{display:false},ticks:{color:"#7a8094",font:{size:9},maxRotation:0,autoSkip:false}},
        y:{grid:{color:"rgba(255,255,255,.04)"},ticks:{color:"#7a8094",font:{size:9},callback:v=>v+"%"},border:{display:false},suggestedMin:Math.min(-2,...st.rs)-.5,suggestedMax:Math.max(2,...st.rs)+.5}}}});
}

function ctxx(sec,mi,yr,v){
  const g={"IT & Technology":{6:"Q1 results",7:"Guidance update",1:"Budget impact",3:"Deal season"},"Pharmaceuticals":{6:"Q1 FDA update",7:"US approvals",9:"Results season"},"Banking":{0:"RBI policy",3:"Credit growth",9:"Festive loans"},"FMCG":{8:"Festive demand",9:"Diwali sales",2:"Summer push"},"Energy & Power":{5:"Oil/power price",9:"Commodity rally",11:"Winter demand"},"Oil & Gas":{5:"Oil price move",6:"Monsoon demand",9:"Crude rally"},"Automobiles":{7:"Monsoon sales",9:"Festive season",10:"Diwali retail"},"Metals & Mining":{5:"China demand",6:"Monsoon infra",9:"Commodity cycle"},"Infrastructure":{2:"Budget capex",3:"Order wins",6:"Monsoon projects"},"Chemicals":{5:"Kharif season",8:"Export orders",11:"Year-end"},"Agrochemicals":{3:"Kharif prep",4:"Sowing season",9:"Rabi season"},"Real Estate":{8:"Festive launches",9:"Diwali demand",2:"Budget sops"},"Consumer Durables":{4:"Summer AC peak",8:"Festive buying",9:"Diwali"},"Logistics":{9:"Festive shipments",10:"E-comm peak",3:"Summer move"},"Textiles":{1:"Winter stock",7:"Festive buying",9:"Export season"},"Retail":{8:"Festive stocking",9:"Diwali",10:"Year-end"},"Defence":{2:"Budget defence",3:"Order pipeline",6:"HAL results"},"Railways":{2:"Budget rail capex",3:"RVNL orders",6:"Monsoon projects"}};
  const sd=g[sec]||{};
  if(yr===2026)return"2026 Jan–May data";
  if(sd[mi])return sd[mi];
  if(yr===2020&&mi>=2&&mi<=4)return"COVID-19 crash";
  if(yr===2020&&mi>=5)return"Recovery rally";
  if(yr===2022&&mi<=4)return"Rate hike fears";
  if(yr===2022&&mi>=5)return"FII return";
  if(yr===2024&&mi<=2)return"Election rally";
  if(yr===2025&&mi<=2)return"Budget 2025";
  if(v>4)return"Strong rally";if(v<-4)return"Sharp selloff";
  return"—";
}

function shareApp(){
  const url=window.location.href;
  if(navigator.clipboard){navigator.clipboard.writeText(url).then(()=>showT("✓ Link copied to clipboard!")).catch(()=>prompt("Copy link:",url));}
  else prompt("Copy link:",url);
}
function showT(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2500);}
flt();
</script>
